name: Fetch electricity prices

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:        # allow manual run

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch today's prices
        run: |
          mkdir -p data
          curl -sf "https://elektra.p5.lt/api/v2/today?apikey=${{ secrets.ELEKTRA_API_KEY || 'demo' }}" \
            -o data/today.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/today.json
          git diff --cached --quiet || git commit -m "chore: update price data"
          git push
